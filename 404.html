<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
	<title>Redirecting...</title>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<meta http-equiv="refresh" content="3; /index.htm"/>
	<script>
		/* <![CDATA[ */
		const routes = {
			"github": "https://github.com/yyka",
			"hltb": "https://howlongtobeat.com/user/Yayaka",
			"lastfm": "https://www.last.fm/user/Yayaka_",
			"mal": "https://myanimelist.net/profile/yyk",
			"twitter": "https://twitter.com/yyka_",
			"youtube": "https://www.youtube.com/yayaka"
		};
		const path = window.location.pathname.replace(/^\/|\/$/g, '');
		if (routes[path]) {
			window.location.replace(routes[path]);
		} else {
			document.addEventListener('DOMContentLoaded', () => {
				document.body.innerHTML = `
<h1>404</h1>
<p>The file or resource you requested doesn't exist.</p>
<p>You will be redirected to the home page shortly...</p>
<p>If nothing happens, <a href="/index.htm">click here</a>.</p>
`;
			});
		}

	</script>
</head>

<body>
</body>

</html>
